<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEEL Helm — Sailing Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg: #020912;
  --surface: #071525;
  --surface2: #0b1d30;
  --surface3: #102540;
  --border: #1a3050;
  --accent: #4ab3ff;
  --accent-glow: rgba(74,179,255,0.2);
  --rope: #c8a96e;
  --brass: #d4a840;
  --teal: #00c8a0;
  --foam: #e8f4ff;
  --danger: #ff5370;
  --amber: #ffb347;
  --text: #ddeeff;
  --muted: #3a607a;
  --muted2: #6090b0;
  --mono: 'Space Mono', monospace;
  --sans: 'Inter', sans-serif;
  --display: 'Space Grotesk', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Top bar ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #051022, var(--bg));
  flex-wrap: wrap;
}
.brand { font-family: var(--display); font-weight: 700; font-size: 18px; color: var(--foam); letter-spacing: 0.5px; }
.brand .helm { color: var(--accent); }
.coords {
  font-family: var(--mono); font-size: 11px; color: var(--muted2); letter-spacing: 1px;
  cursor: pointer; user-select: none;
}
.coords:hover { color: var(--accent); }
.topbar .hint { font-size: 11px; color: var(--muted); }
/* Embedded inside the keel-app Weather page: the app topbar already shows the title */
body.embedded .brand { display: none; }
body.embedded .topbar { padding: 10px 16px; }

/* ── Layout ── */
.layout { display: flex; min-height: calc(100vh - 57px); }
.map-pane { flex: 1.2; min-width: 0; position: relative; }
#map { position: absolute; inset: 0; background: #04101e; }
.panel {
  flex: 1; min-width: 360px; max-width: 560px;
  border-left: 1px solid var(--border);
  padding: 18px 18px 40px; overflow-y: auto; max-height: calc(100vh - 57px);
}
@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .map-pane { min-height: 44vh; flex: none; }
  #map { position: relative; height: 44vh; }
  .panel { max-width: none; min-width: 0; border-left: none; border-top: 1px solid var(--border); max-height: none; }
}

/* ── Current conditions card ── */
.card {
  background: linear-gradient(160deg, var(--surface), var(--surface2));
  border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px;
}
.card h2 { font-family: var(--display); font-size: 14px; color: var(--muted2); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.now-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(96px, 1fr)); gap: 10px; }
.now-stat { background: rgba(74,179,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
.now-stat .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.now-stat .value { font-family: var(--mono); font-size: 17px; color: var(--foam); font-weight: 700; }
.now-stat .value small { font-size: 11px; color: var(--muted2); font-weight: 400; }
.dir-arrow { display: inline-block; color: var(--accent); }

/* ── Verdict banner ── */
.verdict { border-radius: 10px; padding: 10px 14px; font-weight: 600; font-size: 13px; margin-top: 12px; border: 1px solid; }
.verdict.good     { background: rgba(0,200,160,0.10); border-color: rgba(0,200,160,0.4);  color: var(--teal); }
.verdict.marginal { background: rgba(255,179,71,0.10); border-color: rgba(255,179,71,0.4); color: var(--amber); }
.verdict.nogo     { background: rgba(255,83,112,0.10); border-color: rgba(255,83,112,0.4); color: var(--danger); }
.verdict.calm     { background: rgba(96,144,176,0.10); border-color: rgba(96,144,176,0.4); color: var(--muted2); }

/* ── Sailable windows strip ── */
.day { margin-bottom: 14px; }
.day-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 5px; flex-wrap: wrap; }
.day-name { font-family: var(--display); font-weight: 600; font-size: 13px; color: var(--foam); min-width: 84px; }
.day-sun { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.day-best { font-family: var(--mono); font-size: 10px; color: var(--teal); margin-left: auto; }
.day-best.none { color: var(--muted); }
.hours { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; }
.hr {
  height: 26px; border-radius: 4px; cursor: pointer; position: relative;
  transition: transform 0.08s ease, outline-color 0.08s;
  outline: 1px solid transparent;
}
.hr:hover { transform: scaleY(1.18); outline-color: var(--foam); z-index: 2; }
.hr.now { outline: 2px solid var(--foam); z-index: 2; }
.hr.sel { outline: 2px solid var(--accent); z-index: 3; }
.hr.good     { background: rgba(0,200,160,0.75); }
.hr.marginal { background: rgba(255,179,71,0.65); }
.hr.nogo     { background: rgba(255,83,112,0.60); }
.hr.calm     { background: rgba(96,144,176,0.28); }
.hr.night    { opacity: 0.32; }
.hr-ticks { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; margin-top: 3px; }
.hr-ticks span { font-family: var(--mono); font-size: 8px; color: var(--muted); text-align: center; }

/* ── Hour detail readout ── */
.hour-detail {
  font-family: var(--mono); font-size: 11.5px; color: var(--muted2);
  background: var(--surface3); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; margin-bottom: 16px; min-height: 42px; line-height: 1.7;
}
.hour-detail b { color: var(--foam); }

/* ── Legend ── */
.legend { display: flex; gap: 14px; flex-wrap: wrap; margin: 4px 0 16px; }
.legend span { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted2); }
.legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
.legend .lg-good { background: rgba(0,200,160,0.75); }
.legend .lg-marg { background: rgba(255,179,71,0.65); }
.legend .lg-nogo { background: rgba(255,83,112,0.60); }
.legend .lg-calm { background: rgba(96,144,176,0.28); }
.legend .lg-now { background: transparent; outline: 2px solid var(--foam); outline-offset: -2px; }

.loading { color: var(--muted2); font-size: 13px; padding: 20px 0; text-align: center; }
.err { color: var(--danger); font-size: 12px; }
.note { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.6; }

/* Leaflet dark-theme nudges */
.leaflet-container { font-family: var(--sans); }
.leaflet-control-attribution { background: rgba(2,9,18,0.7) !important; color: var(--muted) !important; font-size: 9px !important; }
.leaflet-control-attribution a { color: var(--muted2) !important; }
.leaflet-bar a { background: var(--surface2) !important; color: var(--foam) !important; border-color: var(--border) !important; }
.locate-btn {
  position: absolute; top: 80px; left: 10px; z-index: 1000;
  background: var(--surface2); color: var(--foam); border: 1px solid var(--border);
  border-radius: 6px; width: 32px; height: 32px; font-size: 16px; cursor: pointer; line-height: 1;
}
.locate-btn:hover { background: var(--surface3); }

/* ── Animated layer toggles ── */
.layer-toggles { position: absolute; top: 10px; right: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.layer-btn {
  background: var(--surface2); color: var(--muted2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px; font-family: var(--mono); font-size: 11px; cursor: pointer;
}
.layer-btn:hover { color: var(--foam); }
.layer-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(74,179,255,0.12); }
.layer-btn:disabled { opacity: 0.5; cursor: default; }
.radar-time { font-family: var(--mono); font-size: 9px; color: var(--muted2); background: rgba(2,9,18,0.6); padding: 2px 6px; border-radius: 6px; display: none; }
.radar-time.future { color: var(--amber); }
#wind-canvas { position: absolute; inset: 0; z-index: 450; pointer-events: none; }
#cast-canvas { position: absolute; inset: 0; z-index: 440; pointer-events: none; }

/* ── Rain time scrubber ── */
.time-slider {
  position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%);
  z-index: 1000; display: none; align-items: center; gap: 8px;
  width: min(72%, 420px); padding: 7px 12px;
  background: rgba(7,21,37,0.88); border: 1px solid var(--border); border-radius: 10px;
}
.time-slider button {
  background: none; border: none; color: var(--accent); font-size: 12px;
  cursor: pointer; padding: 2px 4px; line-height: 1; flex-shrink: 0;
}
.ts-end { font-family: var(--mono); font-size: 9px; color: var(--muted); flex-shrink: 0; }
.ts-end.future { color: var(--amber); }
#rain-scrub {
  flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px;
  background: linear-gradient(90deg, var(--muted) 0%, var(--accent) 70%, var(--amber) 100%);
  outline: none; cursor: pointer;
}
#rain-scrub::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--foam); border: 2px solid var(--accent); cursor: pointer;
}
#rain-scrub::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--foam); border: 2px solid var(--accent); cursor: pointer;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">⛵ KEEL <span class="helm">HELM</span> · Sailing Weather</div>
  <div class="coords" id="coords" onclick="locateMe()" title="Tap to use your location">⚓ Locating…</div>
  <div class="hint">Tap the map to move the forecast point</div>
</div>

<div class="layout">
  <div class="map-pane">
    <div id="map"></div>
    <button class="locate-btn" onclick="locateMe()" title="Use my location">⌖</button>
    <div class="layer-toggles">
      <button id="btn-wind" class="layer-btn active" onclick="toggleWind()">≋ Wind</button>
      <button id="btn-rain" class="layer-btn active" onclick="toggleRain()">🌧 Rain</button>
      <div class="radar-time" id="radar-time"></div>
    </div>
    <div class="time-slider" id="time-slider">
      <button id="rain-play" onclick="toggleRainPlay()" title="Play/pause">❚❚</button>
      <span class="ts-end">past</span>
      <input type="range" id="rain-scrub" min="0" max="7" value="0" step="1"
             oninput="scrubRain(this.value)">
      <span class="ts-end future">+2h</span>
    </div>
  </div>
  <div class="panel">
    <div class="card">
      <h2>Right now</h2>
      <div class="now-grid" id="now-grid"><div class="loading">Waiting for a location…</div></div>
      <div id="verdict"></div>
    </div>

    <div class="card">
      <h2>Sailable windows · next 7 days</h2>
      <div class="legend">
        <span><i class="lg-good"></i> Good (7–17 kn)</span>
        <span><i class="lg-marg"></i> Marginal</span>
        <span><i class="lg-nogo"></i> No-go</span>
        <span><i class="lg-calm"></i> Becalmed (&lt;4 kn)</span>
        <span><i class="lg-now"></i> Now</span>
      </div>
      <div class="hour-detail" id="hour-detail">Tap any hour for details.</div>
      <div id="days"><div class="loading">Waiting for a location…</div></div>
      <div class="note" id="wave-note"></div>
    </div>
  </div>
</div>

<script>
"use strict";

// ── Thresholds (knots, feet) — tune these to your boat ──
const T = {
  goodWindMin: 7,  goodWindMax: 17, goodGustMax: 23, goodWaveFt: 3.0, goodPrecip: 40,
  margWindMin: 4,  margWindMax: 22, margGustMax: 27, margWaveFt: 4.5, margPrecip: 70,
  calmBelow: 4, capeStorm: 2000
};

// Fallback start point until geolocation answers (Biscayne Bay).
const FALLBACK = { lat: 25.73, lon: -80.21 };

let map, marker, seamarks;
let state = { lat: null, lon: null, hourly: null, daily: null, marine: null, reqId: 0 };

// ── Map setup: dark base + OpenSeaMap seamark overlay ──
function initMap(){
  map = L.map("map", { zoomControl: true }).setView([FALLBACK.lat, FALLBACK.lon], 9);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom: 19
  }).addTo(map);
  seamarks = L.tileLayer("https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openseamap.org/">OpenSeaMap</a>',
    maxZoom: 18, opacity: 0.9
  }).addTo(map);
  map.on("click", e => setPoint(e.latlng.lat, e.latlng.lng, false));
  initWindLayer();
  initRain();
  initCast();
  initTomorrow();
}

// ── Tomorrow.io forecast tiles for the futurecast frames ────────────────────
// Real km-scale precipitation forecast imagery at +1h and +2h, proxied through
// the keel-ics Cloudflare Worker (/tile route) which holds the Tomorrow.io API
// key as a secret and caches each tile at the edge for 15 min — so the tiny
// free-tier quota is shared across all devices instead of burned per-browser.
// The free tier allows only a trickle of requests, so we never use a Leaflet
// tile layer (which bursts dozens of fetches): instead we pick a zoom ≤7 where
// the view fits in ≤6 tiles, fetch them one at a time through a throttled
// queue with a session cache, and paint them on the cast canvas. Repeated
// failures flip tmrDead and the loop falls back to the Open-Meteo canvas cast.
const TMR_TILE_BASE = "https://keel-ics.keel-app.workers.dev/tile/";
let tmrFrames = [], tmrCache = new Map(), tmrQueue = [], tmrInFlight = false;
let tmrDead = false, tmrFails = 0;

function initTomorrow(){
  tmrFrames = [1, 2].map(hh => {
    const t = new Date(Date.now() + hh * 3600000);
    t.setUTCMinutes(Math.floor(t.getUTCMinutes() / 15) * 15, 0, 0);
    return { time: t.getTime() / 1000, iso: t.toISOString().slice(0, 19) + "Z" };
  });
}
function lon2tile(lon, z){ return Math.floor((lon + 180) / 360 * Math.pow(2, z)); }
function lat2tile(lat, z){
  const r = lat * Math.PI / 180;
  return Math.floor((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z));
}
function tile2lon(x, z){ return x / Math.pow(2, z) * 360 - 180; }
function tile2lat(y, z){
  const n = Math.PI - 2 * Math.PI * y / Math.pow(2, z);
  return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}
function tmrTilesForView(){
  const b = map.getBounds();
  for(let z = 7; z >= 3; z--){
    const x0 = lon2tile(b.getWest(), z), x1 = lon2tile(b.getEast(), z);
    const y0 = lat2tile(b.getNorth(), z), y1 = lat2tile(b.getSouth(), z);
    if((x1 - x0 + 1) * (y1 - y0 + 1) <= 6 || z === 3){
      const list = [];
      for(let x = x0; x <= x1; x++) for(let y = y0; y <= y1; y++) list.push({ z, x, y });
      return list;
    }
  }
  return [];
}
function tmrUrl(iso, t){
  return TMR_TILE_BASE + t.z + "/" + t.x + "/" + t.y + "/" + iso + ".png";
}
function tmrFetch(url){
  if(tmrDead || tmrCache.has(url)) return;
  tmrCache.set(url, null); // requested, not yet loaded
  tmrQueue.push(url);
  tmrPump();
}
function tmrPump(){
  if(tmrInFlight || tmrDead || !tmrQueue.length) return;
  const url = tmrQueue.shift();
  tmrInFlight = true;
  const img = new Image();
  img.onload = () => { tmrCache.set(url, img); tmrInFlight = false; setTimeout(tmrPump, 450); };
  img.onerror = () => {
    tmrCache.delete(url);
    tmrInFlight = false;
    if(++tmrFails > 5 && !tmrDead){
      tmrDead = true; tmrQueue = [];
      if(rainOn && rainTimer) startRain(); // rebuild playlist on the fallback
    } else setTimeout(tmrPump, 900);
  };
  img.src = url;
}
// Paint whatever tiles are cached for this frame; queue fetches for the rest.
function drawTmrFrame(frame){
  clearCast();
  let drawn = 0;
  for(const t of tmrTilesForView()){
    const url = tmrUrl(frame.iso, t);
    const img = tmrCache.get(url);
    if(img === undefined) tmrFetch(url);
    if(img){
      const p0 = map.latLngToContainerPoint([tile2lat(t.y, t.z), tile2lon(t.x, t.z)]);
      const p1 = map.latLngToContainerPoint([tile2lat(t.y + 1, t.z), tile2lon(t.x + 1, t.z)]);
      castCtx.globalAlpha = 0.75;
      castCtx.imageSmoothingEnabled = true;
      castCtx.drawImage(img, p0.x, p0.y, p1.x - p0.x, p1.y - p0.y);
      castCtx.globalAlpha = 1;
      drawn++;
    }
  }
  return drawn;
}

// ── Animated wind particle layer ─────────────────────────────────────────────
// Samples a WIND_N×WIND_N grid of current wind over the visible map from
// Open-Meteo, then advects particles through the bilinearly-interpolated field.
let windCanvas, windCtx, windGrid = null, windAnim = null, windOn = true;
let windFetchTimer = null, particles = [], lastWindTs = 0;
// Motion is time-based (px/sec) so speed looks identical at 60Hz and 120Hz.
// Grid sizes are kept small and refetches throttled: Open-Meteo counts every
// grid point as one API call toward its per-IP rate limits (~600/min, 5k/hr).
const WIND_N = 6, WIND_KN_TO_PX_S = 4, PARTICLE_LIFE_S = 1.6, TRAIL_KEEP_PER_S = 0.013;
const WIND_GRID_MAX_AGE_MS = 180000; // reuse a covering wind grid for 3 min

function initWindLayer(){
  windCanvas = document.createElement("canvas");
  windCanvas.id = "wind-canvas";
  map.getContainer().appendChild(windCanvas);
  windCtx = windCanvas.getContext("2d");
  sizeWindCanvas();
  map.on("resize", sizeWindCanvas);
  map.on("movestart zoomstart", pauseWind);
  map.on("moveend zoomend", resumeWind);
  // Let the main forecast call go first so it isn't starved of rate-limit quota
  setTimeout(refreshWindGrid, 2500);
}
function sizeWindCanvas(){
  const s = map.getSize();
  windCanvas.width = s.x; windCanvas.height = s.y;
}
function pauseWind(){
  if(windAnim){ cancelAnimationFrame(windAnim); windAnim = null; }
  if(windCtx) windCtx.clearRect(0, 0, windCanvas.width, windCanvas.height);
}
function resumeWind(){
  sizeWindCanvas();
  if(windFetchTimer) clearTimeout(windFetchTimer);
  windFetchTimer = setTimeout(refreshWindGrid, 600);
  if(windOn && windGrid && !windAnim){ seedParticles(); stepWind(); }
}
function gridCovers(g, fetchedAt, maxAgeMs){
  if(!g || Date.now() - fetchedAt > maxAgeMs) return false;
  const b = map.getBounds();
  return b.getNorth() <= g.lat0 && b.getSouth() >= g.lat1 &&
         b.getWest() >= g.lon0 && b.getEast() <= g.lon1;
}
let windGridFetchedAt = 0;
async function refreshWindGrid(){
  if(!windOn) return;
  if(gridCovers(windGrid, windGridFetchedAt, WIND_GRID_MAX_AGE_MS)){
    if(!windAnim){ seedParticles(); stepWind(); }
    return;
  }
  const b = map.getBounds().pad(0.15);
  const lat0 = b.getNorth(), lat1 = b.getSouth(), lon0 = b.getWest(), lon1 = b.getEast();
  const lats = [], lons = [];
  for(let r = 0; r < WIND_N; r++) for(let c = 0; c < WIND_N; c++){
    lats.push((lat0 + (lat1 - lat0) * r / (WIND_N - 1)).toFixed(3));
    lons.push((lon0 + (lon1 - lon0) * c / (WIND_N - 1)).toFixed(3));
  }
  try {
    const url = "https://api.open-meteo.com/v1/forecast?latitude=" + lats.join(",") +
      "&longitude=" + lons.join(",") + "&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn";
    const res = await fetch(url);
    if(!res.ok) throw new Error("wind grid http " + res.status);
    let arr = await res.json();
    if(!Array.isArray(arr)) arr = [arr];
    const cells = arr.map(p => {
      const c = p.current || {};
      const spd = c.wind_speed_10m || 0, dir = c.wind_direction_10m || 0;
      const rad = (dir + 180) * Math.PI / 180; // direction is "from"; flow is toward dir+180
      return { u: spd * Math.sin(rad), v: -spd * Math.cos(rad), s: spd };
    });
    windGrid = { cells, lat0, lat1, lon0, lon1 };
    windGridFetchedAt = Date.now();
    if(windOn && !windAnim){ seedParticles(); stepWind(); }
  } catch(e){ /* keep the previous grid; particles just stay on old data */ }
}
function seedParticles(){
  // Density scales with map area so phones aren't overdrawn
  const count = Math.round(Math.max(250, Math.min(700, windCanvas.width * windCanvas.height / 1800)));
  particles = [];
  for(let i = 0; i < count; i++) particles.push(spawnParticle());
}
function spawnParticle(){
  return { x: Math.random() * windCanvas.width, y: Math.random() * windCanvas.height,
           age: Math.random() * PARTICLE_LIFE_S };
}
function gridAt(lat, lon){
  const g = windGrid;
  let fx = (lon - g.lon0) / (g.lon1 - g.lon0) * (WIND_N - 1);
  let fy = (g.lat0 - lat) / (g.lat0 - g.lat1) * (WIND_N - 1);
  fx = Math.max(0, Math.min(WIND_N - 1.001, fx));
  fy = Math.max(0, Math.min(WIND_N - 1.001, fy));
  const x0 = Math.floor(fx), y0 = Math.floor(fy), tx = fx - x0, ty = fy - y0;
  const at = (r, c) => g.cells[r * WIND_N + c];
  const a = at(y0, x0), b = at(y0, x0 + 1), c = at(y0 + 1, x0), d = at(y0 + 1, x0 + 1);
  return {
    u: (a.u * (1 - tx) + b.u * tx) * (1 - ty) + (c.u * (1 - tx) + d.u * tx) * ty,
    v: (a.v * (1 - tx) + b.v * tx) * (1 - ty) + (c.v * (1 - tx) + d.v * tx) * ty,
    s: (a.s * (1 - tx) + b.s * tx) * (1 - ty) + (c.s * (1 - tx) + d.s * tx) * ty
  };
}
// Trail color follows the same speed bands as the sailable-windows strip
function windColor(s){
  if(s < T.calmBelow) return "rgba(96,144,176,0.5)";
  if(s <= T.goodWindMax) return "rgba(0,200,160,0.7)";
  if(s <= T.margWindMax) return "rgba(255,179,71,0.75)";
  return "rgba(255,83,112,0.8)";
}
function stepWind(ts){
  windAnim = requestAnimationFrame(stepWind);
  const w = windCanvas.width, h = windCanvas.height;
  if(!windGrid || !w || !h) return;
  if(!ts) ts = performance.now();
  let dt = (ts - lastWindTs) / 1000;
  lastWindTs = ts;
  if(dt <= 0 || dt > 0.1) dt = 0.016; // first frame, or resume after a pause
  // Approximate linear px→lat/lon mapping for the frame (fine at these zooms)
  const nw = map.containerPointToLatLng([0, 0]), se = map.containerPointToLatLng([w, h]);
  windCtx.globalCompositeOperation = "destination-in";
  windCtx.fillStyle = "rgba(0,0,0," + Math.pow(TRAIL_KEEP_PER_S, dt).toFixed(4) + ")";
  windCtx.fillRect(0, 0, w, h);
  windCtx.globalCompositeOperation = "source-over";
  windCtx.lineWidth = 1.3;
  for(const p of particles){
    const lat = nw.lat + (p.y / h) * (se.lat - nw.lat);
    const lon = nw.lng + (p.x / w) * (se.lng - nw.lng);
    const wv = gridAt(lat, lon);
    const nx = p.x + wv.u * WIND_KN_TO_PX_S * dt, ny = p.y + wv.v * WIND_KN_TO_PX_S * dt;
    p.age += dt;
    if(p.age > PARTICLE_LIFE_S || nx < 0 || nx > w || ny < 0 || ny > h){
      Object.assign(p, spawnParticle(), { age: 0 });
      continue;
    }
    windCtx.strokeStyle = windColor(wv.s);
    windCtx.beginPath(); windCtx.moveTo(p.x, p.y); windCtx.lineTo(nx, ny); windCtx.stroke();
    p.x = nx; p.y = ny;
  }
}
function toggleWind(){
  windOn = !windOn;
  document.getElementById("btn-wind").classList.toggle("active", windOn);
  if(!windOn) pauseWind();
  else if(windGrid){ seedParticles(); stepWind(); }
  else refreshWindGrid();
}

// ── Animated rain radar layer (RainViewer, free/no key) ─────────────────────
// Loops the last hour of radar frames plus the first nowcast frame.
let rainOn = true, rainLayers = [], rainFrames = [], rainTimer = null;
async function initRain(){
  map.createPane("rain");
  map.getPane("rain").style.zIndex = 350;          // above base tiles, below markers
  map.getPane("rain").style.pointerEvents = "none";
  try {
    const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    if(!res.ok) throw new Error("rainviewer http " + res.status);
    const data = await res.json();
    rainFrames = ((data.radar && data.radar.past) || []).slice(-6)
      .concat((data.radar && data.radar.nowcast) || []);
    if(!rainFrames.length) throw new Error("no radar frames");
    rainLayers = rainFrames.map(f =>
      L.tileLayer(data.host + f.path + "/256/{z}/{x}/{y}/2/1_1.png",
        // RainViewer's free radar tiles only contain data through z7 (~1km/px,
        // the radar's real resolution) — deeper zooms return blank placeholders,
        // so upscale from z7 to keep radar visible at every zoom level.
        { pane: "rain", opacity: 0, maxNativeZoom: 7, maxZoom: 19,
          attribution: '<a href="https://www.rainviewer.com/">RainViewer</a>' }
      ).addTo(map));
    if(rainOn) startRain();
  } catch(e){
    const btn = document.getElementById("btn-rain");
    btn.disabled = true; btn.classList.remove("active"); btn.textContent = "🌧 Rain n/a";
  }
}
// The rain timeline: radar tile frames (past + RainViewer nowcast), then
// futurecast frames out to +2h. Auto-plays as a loop, and the slider under
// the map scrubs through the same playlist from past to future.
let rainPlaylist = [], rainPos = -1, rainPlaying = true;

function buildRainPlaylist(){
  const lastRadarTime = rainFrames.length ? rainFrames[rainFrames.length - 1].time : 0;
  // Future frames: Tomorrow.io forecast tiles when healthy, else model canvas
  const future = (!tmrDead && tmrFrames.length)
    ? tmrFrames.map(f => ({ kind: "tmr", frame: f, time: f.time, label: "cast" }))
    : castSteps.filter(s => s.time > lastRadarTime)
        .map(s => ({ kind: "cast", step: s, time: s.time, label: "cast" }));
  rainPlaylist = rainFrames.map((f, i) => ({
      kind: "tile", idx: i, time: f.time,
      label: f.time * 1000 > Date.now() ? "nowcast" : "radar"
    })).concat(future);
  const s = document.getElementById("rain-scrub");
  s.max = Math.max(0, rainPlaylist.length - 1);
  if(rainPos >= rainPlaylist.length) rainPos = 0;
}
function showRainFrame(i){
  if(!rainPlaylist.length) return;
  rainPos = i;
  const fr = rainPlaylist[i];
  rainLayers.forEach(l => l.setOpacity(0));
  clearCast();
  if(fr.kind === "tile") rainLayers[fr.idx].setOpacity(0.65);
  else if(fr.kind === "tmr") drawTmrFrame(fr.frame);
  else drawCastStep(fr.step);
  const el = document.getElementById("radar-time");
  const mins = Math.round((fr.time - Date.now() / 1000) / 60);
  el.style.display = "block";
  el.textContent = fr.label + " " + time12(new Date(fr.time * 1000).toTimeString().slice(0, 5)) +
                   (mins > 0 ? " (+" + mins + "m)" : "");
  el.classList.toggle("future", mins > 0);
  document.getElementById("rain-scrub").value = i;
}
function startRain(){
  if(rainTimer){ clearInterval(rainTimer); rainTimer = null; }
  buildRainPlaylist();
  if(!rainPlaylist.length) return;
  document.getElementById("time-slider").style.display = "flex";
  if(rainPlaying) rainTimer = setInterval(() => showRainFrame((rainPos + 1) % rainPlaylist.length), 700);
}
function toggleRainPlay(){
  rainPlaying = !rainPlaying;
  document.getElementById("rain-play").textContent = rainPlaying ? "❚❚" : "▶";
  if(rainTimer){ clearInterval(rainTimer); rainTimer = null; }
  if(rainPlaying && rainOn && rainPlaylist.length)
    rainTimer = setInterval(() => showRainFrame((rainPos + 1) % rainPlaylist.length), 700);
}
// Dragging the slider pauses playback and shows that frame
function scrubRain(v){
  if(rainPlaying) toggleRainPlay();
  showRainFrame(Math.min(parseInt(v, 10), rainPlaylist.length - 1));
}
function toggleRain(){
  if(document.getElementById("btn-rain").disabled) return;
  rainOn = !rainOn;
  document.getElementById("btn-rain").classList.toggle("active", rainOn);
  if(!rainOn){
    if(rainTimer){ clearInterval(rainTimer); rainTimer = null; }
    rainLayers.forEach(l => l.setOpacity(0));
    clearCast();
    document.getElementById("radar-time").style.display = "none";
    document.getElementById("time-slider").style.display = "none";
  } else if(rainLayers.length || castSteps.length || tmrFrames.length) startRain();
}

// ── 2-hour model futurecast (Open-Meteo 15-minute precipitation grid) ───────
// Picks up where the RainViewer nowcast ends; sampled on a CAST_N×CAST_N grid
// over the visible map and rendered as a smoothed canvas overlay.
let castCanvas, castCtx, castSteps = [], castGrid = null, castFetchTimer = null;
let castGridFetchedAt = 0;
const CAST_N = 8, CAST_HOURS = 2;
const CAST_GRID_MAX_AGE_MS = 450000; // reuse a covering cast grid for 7.5 min

function initCast(){
  castCanvas = document.createElement("canvas");
  castCanvas.id = "cast-canvas";
  map.getContainer().appendChild(castCanvas);
  castCtx = castCanvas.getContext("2d");
  sizeCastCanvas();
  map.on("resize", sizeCastCanvas);
  map.on("movestart zoomstart", clearCast);
  map.on("moveend zoomend", () => {
    if(castFetchTimer) clearTimeout(castFetchTimer);
    castFetchTimer = setTimeout(refreshCastGrid, 800);
  });
  // Stagger behind the main forecast and wind grid to spread rate-limit load
  setTimeout(refreshCastGrid, 4500);
}
function sizeCastCanvas(){
  const s = map.getSize();
  castCanvas.width = s.x; castCanvas.height = s.y;
}
function clearCast(){
  if(castCtx) castCtx.clearRect(0, 0, castCanvas.width, castCanvas.height);
}
async function refreshCastGrid(){
  if(gridCovers(castGrid, castGridFetchedAt, CAST_GRID_MAX_AGE_MS)) return;
  const b = map.getBounds().pad(0.15);
  const lat0 = b.getNorth(), lat1 = b.getSouth(), lon0 = b.getWest(), lon1 = b.getEast();
  const lats = [], lons = [];
  for(let r = 0; r < CAST_N; r++) for(let c = 0; c < CAST_N; c++){
    lats.push((lat0 + (lat1 - lat0) * r / (CAST_N - 1)).toFixed(3));
    lons.push((lon0 + (lon1 - lon0) * c / (CAST_N - 1)).toFixed(3));
  }
  try {
    const steps = CAST_HOURS * 4 + 2; // 15-min steps, plus slack for the current block
    const url = "https://api.open-meteo.com/v1/forecast?latitude=" + lats.join(",") +
      "&longitude=" + lons.join(",") + "&minutely_15=precipitation" +
      "&forecast_minutely_15=" + steps + "&timeformat=unixtime";
    const res = await fetch(url);
    if(!res.ok) throw new Error("cast http " + res.status);
    let arr = await res.json();
    if(!Array.isArray(arr)) arr = [arr];
    const times = arr[0].minutely_15.time;
    const now = Date.now() / 1000;
    const newSteps = [];
    for(let t = 0; t < times.length && newSteps.length < CAST_HOURS * 4; t++){
      if(times[t] <= now) continue;
      const cells = new Float32Array(CAST_N * CAST_N);
      for(let i = 0; i < arr.length; i++) cells[i] = arr[i].minutely_15.precipitation[t] || 0;
      newSteps.push({ time: times[t], cells });
    }
    castGrid = { lat0, lat1, lon0, lon1 };
    castGridFetchedAt = Date.now();
    castSteps = newSteps;
    if(rainOn && rainTimer) startRain(); // rebuild the playlist with fresh frames
  } catch(e){ /* keep whatever we had; radar frames still play */ }
}
// Precip (mm per 15min → mm/h) to radar-style color
function castColor(mmh){
  if(mmh < 0.15) return [0, 0, 0, 0];
  if(mmh < 1)    return [110, 175, 255, 110];
  if(mmh < 3)    return [45, 125, 255, 150];
  if(mmh < 8)    return [255, 179, 71, 170];
  return [255, 83, 112, 190];
}
function drawCastStep(step){
  if(!castGrid) return;
  const N = CAST_N;
  const off = drawCastStep._off || (drawCastStep._off = document.createElement("canvas"));
  off.width = N; off.height = N;
  const octx = off.getContext("2d");
  const img = octx.createImageData(N, N);
  for(let i = 0; i < N * N; i++){
    const c = castColor(step.cells[i] * 4); // mm/15min → mm/h
    img.data[i * 4] = c[0]; img.data[i * 4 + 1] = c[1];
    img.data[i * 4 + 2] = c[2]; img.data[i * 4 + 3] = c[3];
  }
  octx.putImageData(img, 0, 0);
  const tl = map.latLngToContainerPoint([castGrid.lat0, castGrid.lon0]);
  const br = map.latLngToContainerPoint([castGrid.lat1, castGrid.lon1]);
  clearCast();
  castCtx.imageSmoothingEnabled = true;
  castCtx.drawImage(off, tl.x, tl.y, br.x - tl.x, br.y - tl.y);
}

function setPoint(lat, lon, recenter){
  state.lat = lat; state.lon = lon;
  if(marker) marker.setLatLng([lat, lon]);
  else marker = L.marker([lat, lon]).addTo(map);
  if(recenter) map.setView([lat, lon], Math.max(map.getZoom(), 9));
  document.getElementById("coords").textContent =
    "⚓ " + formatCoord(lat,"N","S") + " · " + formatCoord(lon,"E","W");
  loadForecast(lat, lon);
}

// Same degree-minute formatting as the keel-app hero.
function formatCoord(value, posLabel, negLabel){
  const dir = value >= 0 ? posLabel : negLabel;
  const abs = Math.abs(value);
  const deg = Math.floor(abs);
  const min = Math.round((abs - deg) * 60);
  return deg + "°" + String(min).padStart(2,"0") + "′" + dir;
}

function locateMe(){
  const el = document.getElementById("coords");
  if(!("geolocation" in navigator)){ el.textContent = "⚓ Location unavailable"; setPoint(FALLBACK.lat, FALLBACK.lon, true); return; }
  el.textContent = "⚓ Locating…";
  navigator.geolocation.getCurrentPosition(
    pos => setPoint(pos.coords.latitude, pos.coords.longitude, true),
    err => {
      el.textContent = (err && err.code === 1) ? "⚓ Location off · tap to retry" : "⚓ Tap to locate";
      if(state.lat == null) setPoint(FALLBACK.lat, FALLBACK.lon, true);
    },
    { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
  );
}

// ── Data fetch: Open-Meteo forecast + marine (marine fails politely inland) ──
async function loadForecast(lat, lon){
  const reqId = ++state.reqId;
  document.getElementById("now-grid").innerHTML = '<div class="loading">Reading the wind…</div>';
  document.getElementById("days").innerHTML = '<div class="loading">Charting the week…</div>';
  document.getElementById("verdict").innerHTML = "";
  document.getElementById("hour-detail").textContent = "Tap any hour for details.";

  const fUrl = "https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+
    "&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,weather_code" +
    "&hourly=wind_speed_10m,wind_gusts_10m,wind_direction_10m,precipitation_probability,cape,temperature_2m,weather_code" +
    "&minutely_15=precipitation&forecast_minutely_15=10&precipitation_unit=inch" +
    "&daily=sunrise,sunset&wind_speed_unit=kn&temperature_unit=fahrenheit&timezone=auto&forecast_days=7";
  const mUrl = "https://marine-api.open-meteo.com/v1/marine?latitude="+lat+"&longitude="+lon+
    "&current=wave_height,wave_period&hourly=wave_height,wave_period&timezone=auto&forecast_days=7";

  let fc = null, marine = null, lastStatus = 0;
  // Two attempts: transient hiccups and brief rate-limit windows often clear fast
  for(let attempt = 0; attempt < 2 && !fc; attempt++){
    if(attempt) await new Promise(r => setTimeout(r, 2500));
    try {
      const res = await fetch(fUrl);
      lastStatus = res.status;
      if(!res.ok) throw new Error("forecast http " + res.status);
      fc = await res.json();
    } catch(e){ /* retry once, then report below */ }
  }
  if(!fc){
    if(reqId !== state.reqId) return;
    const msg = lastStatus === 429
      ? "Weather service is rate-limited right now — give it a minute, then tap the map to retry."
      : "Forecast fetch failed — check connection, then tap the map to retry.";
    document.getElementById("now-grid").innerHTML = '<div class="err">' + msg + '</div>';
    document.getElementById("days").innerHTML = "";
    return;
  }
  try {
    const res = await fetch(mUrl);
    if(res.ok){
      const m = await res.json();
      if(m && m.hourly && m.hourly.wave_height && m.hourly.wave_height.some(v => v != null)) marine = m;
    }
  } catch(e){ /* inland or marine model gap — proceed without waves */ }

  if(reqId !== state.reqId) return; // a newer tap superseded this one
  state.hourly = fc.hourly; state.daily = fc.daily; state.marine = marine;
  renderNow(fc, marine);
  renderDays(fc, marine);
  document.getElementById("wave-note").textContent = marine
    ? "Wave data: Open-Meteo Marine (significant wave height)."
    : "No wave data for this point (inland or outside marine model coverage) — windows scored on wind alone.";
}

// Sum of forecast precipitation (inches) over the next 8 15-min blocks (2h)
// at the marker point. Returns null if the model has no 15-minute data here.
function rainNext2h(fc){
  const m = fc.minutely_15;
  if(!m || !m.time || !m.precipitation) return null;
  const offsetMs = (fc.utc_offset_seconds || 0) * 1000;
  const now = Date.now();
  let sum = 0, n = 0;
  for(let i = 0; i < m.time.length && n < 8; i++){
    // times are local ISO; convert each block's end to real UTC ms
    const blockEnd = Date.parse(m.time[i] + "Z") - offsetMs + 15 * 60000;
    if(blockEnd <= now) continue;
    sum += m.precipitation[i] || 0;
    n++;
  }
  return n ? sum : null;
}

const COMPASS = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
function compass(deg){ return deg == null ? "" : COMPASS[Math.round(deg/22.5) % 16]; }
function mToFt(m){ return m == null ? null : m * 3.28084; }

// ── 12-hour / US-format display helpers ──
function time12(hhmm){            // "06:28" → "6:28am"
  let h = parseInt(hhmm.slice(0,2), 10);
  const m = hhmm.slice(3,5);
  const ap = h < 12 ? "am" : "pm";
  h = h % 12; if(h === 0) h = 12;
  return h + ":" + m + ap;
}
function hr12(h){                 // 16 → "4pm", 0/24 → "12am"
  h = ((h % 24) + 24) % 24;
  const ap = h < 12 ? "am" : "pm";
  let hh = h % 12; if(hh === 0) hh = 12;
  return hh + ap;
}
function usDateTime(iso){         // "2026-06-12T10:00" → "6/12/2026 10:00am"
  const [d, t] = iso.split("T");
  const p = d.split("-");
  return Number(p[1]) + "/" + Number(p[2]) + "/" + p[0] + " " + time12(t);
}

// ── Hour scoring: good / marginal / nogo / calm ──
function scoreHour(windKn, gustKn, waveFt, precip, cape){
  if(windKn == null) return "nogo";
  const p = precip == null ? 0 : precip, c = cape == null ? 0 : cape;
  if(windKn > T.margWindMax || (gustKn != null && gustKn > T.margGustMax) ||
     (waveFt != null && waveFt > T.margWaveFt) || p >= T.margPrecip || c >= T.capeStorm) return "nogo";
  if(windKn < T.calmBelow) return "calm";
  if(windKn >= T.goodWindMin && windKn <= T.goodWindMax &&
     (gustKn == null || gustKn <= T.goodGustMax) &&
     (waveFt == null || waveFt <= T.goodWaveFt) && p < T.goodPrecip && c < T.capeStorm/2) return "good";
  return "marginal";
}

// ── Current conditions card ──
function renderNow(fc, marine){
  const c = fc.current || {};
  const grid = document.getElementById("now-grid");
  const dir = c.wind_direction_10m;
  // wind_direction is "coming from"; arrow shows where it's blowing toward
  const arrow = dir == null ? "" :
    '<span class="dir-arrow" style="transform:rotate(' + ((dir + 180) % 360) + 'deg);display:inline-block">↑</span> ';
  const waveNow = marine && marine.current ? mToFt(marine.current.wave_height) : null;
  const rain2h = rainNext2h(fc);
  const stats = [
    ["Wind", c.wind_speed_10m != null ? arrow + Math.round(c.wind_speed_10m) + " <small>kn " + compass(dir) + "</small>" : "n/a"],
    ["Gusts", c.wind_gusts_10m != null ? Math.round(c.wind_gusts_10m) + " <small>kn</small>" : "n/a"],
    ["Waves", waveNow != null ? waveNow.toFixed(1) + " <small>ft" + (marine.current.wave_period != null ? " @ " + Math.round(marine.current.wave_period) + "s" : "") + "</small>" : "—"],
    ["Rain · 2h", rain2h != null ? (rain2h < 0.005 ? "0" : rain2h.toFixed(2)) + ' <small>in</small>' : "—"]
  ];
  grid.innerHTML = stats.map(s =>
    '<div class="now-stat"><div class="label">' + s[0] + '</div><div class="value">' + s[1] + '</div></div>'
  ).join("");

  const score = scoreHour(c.wind_speed_10m, c.wind_gusts_10m, waveNow, null, null);
  const msg = {
    good: "Good sailing right now — wind in the sweet spot.",
    marginal: "Sailable, but keep an eye on it.",
    nogo: "Stand down — conditions over your limits.",
    calm: "Becalmed — not enough wind to sail."
  }[score];
  document.getElementById("verdict").innerHTML = '<div class="verdict ' + score + '">' + msg + '</div>';
}

// ── 7-day sailable windows strip ──
function renderDays(fc, marine){
  const h = fc.hourly, d = fc.daily;
  // Current hour in the forecast point's local time, e.g. "2026-06-11T19"
  const nowKey = new Date(Date.now() + (fc.utc_offset_seconds || 0) * 1000)
    .toISOString().slice(0, 13);
  const byDay = {};
  for(let i = 0; i < h.time.length; i++){
    const day = h.time[i].slice(0, 10);
    (byDay[day] = byDay[day] || []).push(i);
  }
  const waveH = marine ? marine.hourly : null;

  let html = "";
  const dayKeys = Object.keys(byDay).slice(0, 7);
  dayKeys.forEach((day, di) => {
    const idxs = byDay[day];
    const dt = new Date(day + "T12:00:00");
    const name = dt.toLocaleDateString("en-US", { weekday: "short", month: "numeric", day: "numeric" });
    const sr = d && d.sunrise && d.sunrise[di] ? d.sunrise[di].slice(11,16) : "07:00";
    const ss = d && d.sunset  && d.sunset[di]  ? d.sunset[di].slice(11,16)  : "19:00";
    const srH = parseInt(sr.slice(0,2),10), ssH = parseInt(ss.slice(0,2),10);

    let cells = "", best = { len: 0, start: -1, end: -1 }, run = { len: 0, start: -1 };
    idxs.forEach(i => {
      const hour = parseInt(h.time[i].slice(11,13), 10);
      const waveFt = waveH && waveH.wave_height[i] != null ? mToFt(waveH.wave_height[i]) : null;
      const score = scoreHour(h.wind_speed_10m[i], h.wind_gusts_10m[i], waveFt,
                              h.precipitation_probability ? h.precipitation_probability[i] : null,
                              h.cape ? h.cape[i] : null);
      const daylight = hour >= srH && hour <= ssH;
      // Track the longest daylight run of sailable hours (good or marginal)
      if(daylight && (score === "good" || score === "marginal")){
        if(run.len === 0) run.start = hour;
        run.len++;
        if(run.len > best.len) best = { len: run.len, start: run.start, end: hour + 1 };
      } else { run.len = 0; }
      cells += '<div class="hr ' + score + (daylight ? "" : " night") +
        (h.time[i].slice(0, 13) === nowKey ? " now" : "") + '" data-i="' + i + '"' +
        ' title="' + time12(h.time[i].slice(11,16)) + " · " + Math.round(h.wind_speed_10m[i]) + ' kn"></div>';
    });

    const bestTxt = best.len >= 2
      ? '<span class="day-best">best ' + hr12(best.start) + "–" + hr12(best.end) + "</span>"
      : '<span class="day-best none">no window</span>';
    html += '<div class="day"><div class="day-head"><span class="day-name">' + name + '</span>' +
      '<span class="day-sun">☀ ' + time12(sr) + "–" + time12(ss) + "</span>" + bestTxt + "</div>" +
      '<div class="hours">' + cells + "</div>" +
      (di === dayKeys.length - 1 ? hourTicks() : "") + "</div>";
  });
  const wrap = document.getElementById("days");
  wrap.innerHTML = html;
  wrap.querySelectorAll(".hr").forEach(el => el.addEventListener("click", () => showHour(parseInt(el.dataset.i, 10), el)));
  // Start the detail readout on the current hour so "now" is obvious at a glance
  const nowEl = wrap.querySelector(".hr.now");
  if(nowEl) showHour(parseInt(nowEl.dataset.i, 10), nowEl);
}

function hourTicks(){
  let t = "";
  const tickLabels = { 0: "12a", 6: "6a", 12: "12p", 18: "6p" };
  for(let i = 0; i < 24; i++) t += "<span>" + (tickLabels[i] || "") + "</span>";
  return '<div class="hr-ticks">' + t + "</div>";
}

function showHour(i, el){
  document.querySelectorAll(".hr.sel").forEach(x => x.classList.remove("sel"));
  el.classList.add("sel");
  const h = state.hourly, m = state.marine;
  const waveFt = m && m.hourly.wave_height[i] != null ? mToFt(m.hourly.wave_height[i]) : null;
  const parts = [
    "<b>" + usDateTime(h.time[i]) + "</b>",
    "wind <b>" + Math.round(h.wind_speed_10m[i]) + " kn " + compass(h.wind_direction_10m[i]) + "</b>",
    "gusts <b>" + Math.round(h.wind_gusts_10m[i]) + " kn</b>"
  ];
  if(waveFt != null){
    let w = "waves <b>" + waveFt.toFixed(1) + " ft</b>";
    if(m.hourly.wave_period && m.hourly.wave_period[i] != null) w += " @ <b>" + Math.round(m.hourly.wave_period[i]) + "s</b>";
    parts.push(w);
  }
  if(h.precipitation_probability) parts.push("rain <b>" + h.precipitation_probability[i] + "%</b>");
  if(h.temperature_2m) parts.push("<b>" + Math.round(h.temperature_2m[i]) + "°F</b>");
  document.getElementById("hour-detail").innerHTML = parts.join(" · ");
}

if(window.self !== window.top) document.body.classList.add("embedded");
initMap();
locateMe();
</script>
