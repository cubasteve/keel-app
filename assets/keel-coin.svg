<svg width="480" height="480" viewBox="0 0 480 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>KEEL token</title>
<desc>KEEL fractional boat-club token: a dark coin with a cyan-to-violet gradient ring, a geometric sail-and-keel mark, and the KEEL wordmark inside.</desc>
<defs>
<linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#5cf2c9"/>
<stop offset="45%" stop-color="#2fb8ff"/>
<stop offset="100%" stop-color="#7a5cff"/>
</linearGradient>
<radialGradient id="disc" cx="38%" cy="28%" r="88%">
<stop offset="0%" stop-color="#10243f"/>
<stop offset="60%" stop-color="#0a1730"/>
<stop offset="100%" stop-color="#060d1f"/>
</radialGradient>
<linearGradient id="sail" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#7df0d4"/>
<stop offset="100%" stop-color="#28c2ff"/>
</linearGradient>
<linearGradient id="sail2" x1="0" y1="1" x2="1" y2="0">
<stop offset="0%" stop-color="#2f9bff"/>
<stop offset="100%" stop-color="#7a5cff"/>
</linearGradient>
<linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#7df0d4"/>
<stop offset="55%" stop-color="#3fc6ff"/>
<stop offset="100%" stop-color="#9a7cff"/>
</linearGradient>
</defs>

<circle cx="240" cy="240" r="224" fill="url(#ring)"/>
<circle cx="240" cy="240" r="202" fill="url(#disc)"/>
<circle cx="240" cy="240" r="202" fill="none" stroke="#1b3a63" stroke-width="1.2"/>
<circle cx="240" cy="240" r="170" fill="none" stroke="#2bd6ff" stroke-width="1.6" stroke-dasharray="2 10" opacity="0.55"/>

<path d="M240 70 L240 256" stroke="#cfe9ff" stroke-width="5.5" stroke-linecap="round"/>
<path d="M244 78 L330 250 L244 250 Z" fill="url(#sail)"/>
<path d="M236 96 L156 250 L236 250 Z" fill="url(#sail2)" opacity="0.92"/>
<path d="M244 78 L330 250 L244 250 Z" fill="none" stroke="#0a1730" stroke-width="3.2"/>
<path d="M236 96 L156 250 L236 250 Z" fill="none" stroke="#0a1730" stroke-width="3.2"/>

<path d="M156 260 Q240 290 324 260 L302 276 Q240 298 178 276 Z" fill="#9fb6d6"/>
<path d="M240 276 L240 312 Q240 324 253 326 L227 326 Q240 324 240 312" fill="none" stroke="#28c2ff" stroke-width="7.5" stroke-linecap="round"/>
<ellipse cx="240" cy="328" rx="13" ry="6.5" fill="#7a5cff"/>

<path d="M150 284 Q195 272 240 284 T330 284" fill="none" stroke="#2bd6ff" stroke-width="3.6" opacity="0.45" stroke-linecap="round"/>

<text x="240" y="392" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="56" font-weight="700" letter-spacing="12" fill="url(#word)">KEEL</text>
</svg>
